<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple OS V2</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#ff4d6d,#ffb3c1);color:white}
main{padding:15px;padding-bottom:90px}
.card{background:rgba(255,255,255,.15);padding:15px;border-radius:16px;margin-bottom:12px}
.tab{display:none}.active{display:block}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:70px;display:flex;justify-content:space-around;align-items:center;background:rgba(255,255,255,.2)}
button,input,textarea,select{border:none;border-radius:12px;padding:10px;margin-top:8px;width:100%;box-sizing:border-box}
.tabbar button{width:auto;background:none;color:white}
#map{height:350px;border-radius:12px}
</style>
</head>
<body>
<main>
<div id="home" class="tab active">
<div class="card">
<h2>❤️ D + T </h2>
<p id="days"></p>
<p id="thought">Nobody has tapped Thinking Of You yet ❤️</p>
<button onclick="thinking()">❤️ Thinking Of You</button>
</div>
</div>

<div id="notesTab" class="tab">
<div class="card">
<input id="note" placeholder="Love note">
<button onclick="addNote()">Send Note</button>
<div id="notes"></div>
</div>
</div>

<div id="checkTab" class="tab">
<div class="card">
<select id="mood">
  <option>😊 Happy</option>
  <option>❤️ Connected</option>
  <option>😐 Neutral</option>
  <option>🥲 Sad</option>
  <option>😔 Down</option>
  <option>😡 Frustrated</option>
  <option>🥺 Need Support</option>
  <option>😍 In Love</option>
  <option>🤩 Excited</option>
  <option>🍑 Horny</option>
  <option>🖕🏻 Livid</option>
</select>
<textarea id="best" placeholder="Best moment"></textarea>
<button onclick="saveCheck()">
Check In
</button>

<div id="checks"></div>
</div>
</div>

<div id="wheelTab" class="tab">

<div class="card">

<h3>🎡 Date Wheel</h3>

<div style="
font-size:40px;
text-align:center;
margin-bottom:-20px;
">
▼
</div>

<canvas
id="wheel"
width="400"
height="400">
</canvas>

<button onclick="spin()">
🎡 Spin Date Wheel
</button>

<p id="result"></p>

</div>

</div>

<div id="mapTab" class="tab">
<div class="card">
<input id="placeName" placeholder="Place">
<input id="placeMemory" placeholder="Memory">
<button onclick="addPlace()">Add Place</button>
</div>
<div class="card"><div id="map"></div></div>
</div>
</main>

<div class="tabbar">
<button onclick="openTab('home')">🏠</button>
<button onclick="openTab('notesTab')">💌</button>
<button onclick="openTab('checkTab')">🧾</button>
<button onclick="openTab('wheelTab')">🎡</button>
<button onclick="openTab('mapTab')">🗺️</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://myaahpincegqawwtfcfd.supabase.co",
  "sb_publishable_jULm6DqoWuGHNh3ag6qKig__hESizl5"
);

/* =========================
   ELEMENTS
========================= */
const days = document.getElementById("days");
const thought = document.getElementById("thought");
const notesEl = document.getElementById("notes");
const checksEl = document.getElementById("checks");
const noteEl = document.getElementById("note");
const placeNameEl = document.getElementById("placeName");
const placeMemoryEl = document.getElementById("placeMemory");

/* =========================
   SAFE DB LAYER (NO CRASHES)
========================= */
async function getData(key) {
  try {
    const { data, error } = await supabase
      .from("couple_data")
      .select("value")
      .eq("key", key)
      .maybeSingle();

    if (error || !data) return null;
    return data.value;
  } catch {
    return null;
  }
}

async function saveData(key, value) {
  try {
    await supabase
      .from("couple_data")
      .upsert({ key, value });
  } catch (e) {
    console.log("save error", e);
  }
}

/* =========================
   STREAK (CROSS DEVICE)
========================= */
let startDate = new Date("2026-05-23");

async function loadStreak() {
  const stored = await getData("start_date");

  if (stored) {
    startDate = new Date(stored);
  } else {
    await saveData("start_date", "2026-05-23");
  }

  updateStreak();
}

function updateStreak() {
  const daysTogether = Math.floor(
    (Date.now() - startDate) / (1000 * 60 * 60 * 24)
  );

  days.innerText = `❤️ Together for ${daysTogether} days`;
}

setInterval(updateStreak, 3600000);

/* =========================
   THOUGHT
========================= */
async function thinking() {
  const time = new Date().toLocaleString();

  await saveData("thought", time);

  thought.innerText = "❤️ Thinking of you tapped at " + time;
}

async function loadThought() {
  const t = await getData("thought");
  if (t) thought.innerText = "❤️ Thinking of you tapped at " + t;
}

/* =========================
   NOTES
========================= */
async function addNote() {
  const n = noteEl.value.trim();
  if (!n) return;

  let arr = await getData("notes");
  if (!Array.isArray(arr)) arr = [];

  arr.unshift(n);

  await saveData("notes", arr);

  noteEl.value = "";
  renderNotes();
}

async function renderNotes() {
  let arr = await getData("notes");
  if (!Array.isArray(arr)) arr = [];

  notesEl.innerHTML = arr
    .map(x => `<div class="card">❤️ ${x}</div>`)
    .join("");
}

/* =========================
   CHECK-INS
========================= */
async function saveCheck() {
  let arr = await getData("checks");
  if (!Array.isArray(arr)) arr = [];

  arr.unshift({
    m: document.getElementById("mood").value,
    b: document.getElementById("best").value
  });

  await saveData("checks", arr);

  document.getElementById("best").value = "";
  renderChecks();
}

async function renderChecks() {
  let arr = await getData("checks");
  if (!Array.isArray(arr)) arr = [];

  checksEl.innerHTML = arr
    .map(x => `<div class="card">${x.m || ""}<br>${x.b || ""}</div>`)
    .join("");
}

/* =========================
   MAP
========================= */
const map = L.map("map").setView([30.3322, -81.6557], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let places = [];
let markers = [];

async function loadPlaces() {
  const data = await getData("places");
  places = Array.isArray(data) ? data : [];
  drawPlaces();
}

function drawPlaces() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  places.forEach(p => {
    const marker = L.marker([p.lat, p.lon])
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br>${p.memory}`);

    markers.push(marker);
  });
}

async function addPlace() {
  const name = placeNameEl.value.trim();
  if (!name) return;

  let data = await getData("places");
  places = Array.isArray(data) ? data : [];

  places.push({
    name,
    memory: placeMemoryEl.value,
    lat: 30.3322 + (Math.random() - 0.5) * 0.2,
    lon: -81.6557 + (Math.random() - 0.5) * 0.2
  });

  await saveData("places", places);

  placeNameEl.value = "";
  placeMemoryEl.value = "";

  loadPlaces();
}

/* =========================
   INIT
========================= */
window.addEventListener("load", async () => {
  await loadStreak();
  await renderNotes();
  await renderChecks();
  await loadThought();
  await loadPlaces();
});
</script>
</body>
</html>
