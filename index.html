<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple OS</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
background:linear-gradient(135deg,#ff4d6d,#ffb3c1);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:14px;
font-size:20px;
font-weight:600;
}

main{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:80px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:18px;
padding:15px;
margin-bottom:15px;
}

input,textarea,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:600;
background:white;
cursor:pointer;
}

.tabbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
}

.tabbar button{
background:none;
color:white;
font-size:12px;
display:flex;
flex-direction:column;
gap:4px;
width:auto;
}

.tab{display:none;}
.active{display:block;}

canvas{
width:100%;
max-width:320px;
display:block;
margin:auto;
border-radius:50%;
}
</style>
</head>

<body>

<header>❤️ Couple OS</header>

<main>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">
<h3>💖 Live Couple Feed</h3>
<p>Everything syncs instantly between devices.</p>
</div>
</div>

<!-- WHEEL -->
<div id="wheelTab" class="tab">
<div class="card">
<h3>🎡 Date Wheel</h3>
<canvas id="wheel" width="400" height="400"></canvas>
<button onclick="spin()">Spin</button>
<p id="result"></p>
</div>
</div>

<!-- CHECK-IN -->
<div id="checkTab" class="tab">
<div class="card">
<h3>🧾 Check-In</h3>

<select id="mood">
<option>😊 Happy</option>
<option>😐 Neutral</option>
<option>😔 Off</option>
<option>❤️ Connected</option>
</select>

<input id="rating" type="number" placeholder="Rating 1-10">
<textarea id="best" placeholder="Best moment"></textarea>

<button onclick="saveCheck()">Send Check-In</button>
</div>

<div class="card">
<h3>📅 Live Check-Ins</h3>
<div id="checks"></div>
</div>
</div>

<!-- NOTES -->
<div id="notesTab" class="tab">
<div class="card">
<h3>💌 Live Notes</h3>

<input id="noteInput" placeholder="Write something...">
<button onclick="addNote()">Send</button>

<div id="notes"></div>
</div>
</div>

</main>

<!-- TAB BAR -->
<div class="tabbar">
<button onclick="openTab('home')">🏠<span>Home</span></button>
<button onclick="openTab('wheelTab')">🎡<span>Wheel</span></button>
<button onclick="openTab('checkTab')">🧾<span>Check</span></button>
<button onclick="openTab('notesTab')">💌<span>Notes</span></button>
</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyApXz4ql1vGX7RYA2QnemnSUmJEWIy6NZk",
authDomain: "couples-os-561e1.firebaseapp.com",
projectId: "couples-os-561e1",
storageBucket: "couples-os-561e1.firebasestorage.app",
messagingSenderId: "321732798011",
appId: "1:321732798011:web:834e5b8611a129d74c1e1e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* TABS */
window.openTab = function(id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ---------------- NOTES ---------------- */

window.addNote = async function(){
let val = document.getElementById("noteInput").value;
if(!val.trim()) return;

await addDoc(collection(db,"notes"),{
text:val.trim(),
time:Date.now()
});

document.getElementById("noteInput").value="";
}

const notesQ = query(collection(db,"notes"),orderBy("time","desc"));

onSnapshot(notesQ,(snap)=>{
let html="";
snap.forEach(d=>{
html+=`<div class="card">❤️ ${d.data().text}</div>`;
});
document.getElementById("notes").innerHTML=html;
});

/* ---------------- CHECK-INS ---------------- */

window.saveCheck = async function(){
await addDoc(collection(db,"checks"),{
mood:document.getElementById("mood").value,
rating:document.getElementById("rating").value,
best:document.getElementById("best").value,
time:Date.now()
});
}

const checksQ = query(collection(db,"checks"),orderBy("time","desc"));

onSnapshot(checksQ,(snap)=>{
let html="";
snap.forEach(d=>{
let c=d.data();
html+=`
<div class="card">
${c.mood} | ${c.rating}/10<br>
${c.best || ""}
</div>`;
});
document.getElementById("checks").innerHTML=html;
});

/* ---------------- WHEEL ---------------- */

let options=[
"🍕 Pizza Night",
"🌅 Beach Sunset",
"🍽️ Dinner Date",
"☕ Coffee Walk",
"🎬 Movie Night",
"🎳 Bowling"
];

let rotation=0;

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

function draw(){
const arc=2*Math.PI/options.length;

for(let i=0;i<options.length;i++){
let a=i*arc;

ctx.beginPath();
ctx.moveTo(200,200);
ctx.arc(200,200,200,a,a+arc);
ctx.fillStyle=i%2?"#ff6b6b":"#ffd166";
ctx.fill();
}
}

window.spin=function(){
const arc=360/options.length;

rotation += 2500 + Math.random()*600;

canvas.style.transform=`rotate(${rotation}deg)`;

setTimeout(()=>{
let norm=(360-(rotation%360))%360;
let index=Math.floor(norm/arc);

document.getElementById("result").innerText=
"Tonight: " + options[index];

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});
},2200);
}

draw();

</script>

</body>
</html>
