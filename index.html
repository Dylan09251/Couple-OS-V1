<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple OS</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
background:linear-gradient(135deg,#ff4d6d,#ffb3c1);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:14px;
font-size:20px;
font-weight:600;
}

main{
flex:1;
overflow-y:auto;
padding:15px;
padding-bottom:80px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:18px;
padding:15px;
margin-bottom:15px;
}

input,textarea,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:8px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:600;
background:white;
cursor:pointer;
}

.tabbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
align-items:center;
}

.tabbar button{
background:none;
color:white;
font-size:12px;
display:flex;
flex-direction:column;
gap:4px;
width:auto;
}

.tab{display:none;}
.active{display:block;}

canvas{
width:100%;
max-width:320px;
display:block;
margin:auto;
border-radius:50%;
}
</style>
</head>

<body>

<header>❤️ Couple OS</header>

<main>

<!-- HOME -->
<div id="home" class="tab active">

<div class="card">
<h2>❤️ D + T Dashboard</h2>

<p id="daysTogether">⏳ Together for ... days</p>

<p id="latestMood">😊 Latest mood: --</p>

<p id="latestNote">💌 Last note: --</p>

<p id="streak">🔥 Check-in streak: 0 days</p>

<p id="memory">📸 Memory: --</p>

</div>

<div class="card">
<h3>⚡ Quick Actions</h3>

<button onclick="openTab('notesTab')">
💌 Send Love Note
</button>

<button onclick="openTab('checkTab')">
🧾 Check In
</button>

<button onclick="openTab('wheelTab')">
🎡 Pick Tonight's Date
</button>
</div>

</div>

<!-- WHEEL -->
<div id="wheelTab" class="tab">
<div class="card">
<h3>🎡 Date Wheel</h3>
<canvas id="wheel" width="400" height="400"></canvas>
<button onclick="spin()">Spin</button>
<p id="result"></p>
</div>
</div>

<!-- CHECK-IN -->
<div id="checkTab" class="tab">
<div class="card">
<h3>🧾 Check-In</h3>

<select id="mood">
<option>😊 Happy</option>
<option>😐 Neutral</option>
<option>😔 Off</option>
<option>❤️ Connected</option>
</select>

<input id="rating" type="number" placeholder="Rating 1-10">
<textarea id="best" placeholder="Best moment"></textarea>

<button onclick="saveCheck()">Send Check-In</button>
</div>

<div class="card">
<h3>📅 Live Check-Ins</h3>
<div id="checks"></div>
</div>
</div>

<!-- NOTES -->
<div id="notesTab" class="tab">
<div class="card">
<h3>💌 Live Notes</h3>

<input id="noteInput" placeholder="Write something...">
<button onclick="addNote()">Send</button>

<div id="notes"></div>
</div>
</div>

</main>

<!-- TAB BAR -->
<div class="tabbar">
<button onclick="openTab('home')">🏠<span>Home</span></button>
<button onclick="openTab('wheelTab')">🎡<span>Wheel</span></button>
<button onclick="openTab('checkTab')">🧾<span>Check</span></button>
<button onclick="openTab('notesTab')">💌<span>Notes</span></button>
<button onclick="openTab('mapTab')">🗺️<span>Map</span></button>
</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
getDocs
}
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyApXz4ql1vGX7RYA2QnemnSUmJEWIy6NZk",
authDomain: "couples-os-561e1.firebaseapp.com",
projectId: "couples-os-561e1",
storageBucket: "couples-os-561e1.firebasestorage.app",
messagingSenderId: "321732798011",
appId: "1:321732798011:web:834e5b8611a129d74c1e1e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* TABS */
window.openTab = function(id){

document
.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document
.getElementById(id)
.classList.add("active");

if(id==="mapTab" && map){

setTimeout(()=>{
map.invalidateSize();
},200);

}

}

/* ---------------- NOTES ---------------- */

window.addNote = async function(){
let val = document.getElementById("noteInput").value;
if(!val.trim()) return;

await addDoc(collection(db,"notes"),{
text:val.trim(),
time:Date.now()
});

document.getElementById("noteInput").value="";
}

const notesQ = query(collection(db,"notes"),orderBy("time","desc"));

onSnapshot(notesQ,(snap)=>{
let html="";
snap.forEach(d=>{
html+=`<div class="card">❤️ ${d.data().text}</div>`;
});
document.getElementById("notes").innerHTML=html;
});

  /* ---------------- DATE MAP ---------------- */

<!-- DATE MAP -->
<div id="mapTab" class="tab">

<div class="card">
<h3>🗺️ Our Jacksonville Date Map</h3>

<input id="placeName" placeholder="Place Name">

<input id="placeMemory" placeholder="Memory">

<button onclick="addPlace()">
❤️ Add Place
</button>

</div>

<div class="card">
<div id="map"
style="
height:400px;
border-radius:18px;
">
</div>
</div>

</div>

/* ---------------- CHECK-INS ---------------- */

window.saveCheck = async function(){
await addDoc(collection(db,"checks"),{
mood:document.getElementById("mood").value,
rating:document.getElementById("rating").value,
best:document.getElementById("best").value,
time:Date.now()
});
}

const checksQ = query(collection(db,"checks"),orderBy("time","desc"));

onSnapshot(checksQ,(snap)=>{
let html="";
snap.forEach(d=>{
let c=d.data();
html+=`
<div class="card">
${c.mood} | ${c.rating}/10<br>
${c.best || ""}
</div>`;
});
document.getElementById("checks").innerHTML=html;
});

/* ---------------- DATE MAP ---------------- */

let map;
let mapMarkers=[];

setTimeout(()=>{

map = L.map('map').setView(
[30.3322,-81.6557],
11
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

},500);

window.addPlace = async function(){

const name =
document.getElementById("placeName").value;

const memory =
document.getElementById("placeMemory").value;

if(!name.trim()) return;

try{

const response = await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name+" Jacksonville Florida")}`
);

const data = await response.json();

if(!data.length){
alert("Place not found");
return;
}

await addDoc(collection(db,"places"),{
name,
memory,
lat:Number(data[0].lat),
lon:Number(data[0].lon),
time:Date.now()
});

document.getElementById("placeName").value="";
document.getElementById("placeMemory").value="";

}catch(err){
console.error(err);
}

}

const placesQ =
query(
collection(db,"places"),
orderBy("time","desc")
);

onSnapshot(placesQ,(snap)=>{

if(!map) return;

mapMarkers.forEach(marker=>{
map.removeLayer(marker);
});

mapMarkers=[];

snap.forEach(doc=>{

const p = doc.data();

const marker =
L.marker([p.lat,p.lon])
.addTo(map)
.bindPopup(`
<b>${p.name}</b>
<br>
${p.memory || ""}
`);

mapMarkers.push(marker);

});

});
  
/* ---------------- WHEEL ---------------- */

let options=[
"🍕 Pizza Night",
"🌅 Beach Sunset",
"🍽️ Dinner Date",
"☕ Coffee Walk",
"🎬 Movie Night",
"🎳 Bowling"
];

let rotation=0;

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

function draw(){
const arc=2*Math.PI/options.length;

for(let i=0;i<options.length;i++){
let a=i*arc;

ctx.beginPath();
ctx.moveTo(200,200);
ctx.arc(200,200,200,a,a+arc);
ctx.fillStyle=i%2?"#ff6b6b":"#ffd166";
ctx.fill();
}
}

window.spin=function(){
const arc=360/options.length;

rotation += 2500 + Math.random()*600;

canvas.style.transform=`rotate(${rotation}deg)`;

setTimeout(()=>{
let norm=(360-(rotation%360))%360;
let index=Math.floor(norm/arc);

document.getElementById("result").innerText=
"Tonight: " + options[index];

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});
},2200);
}
  draw();

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</script>

</body>
</html>
