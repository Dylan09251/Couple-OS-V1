<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple OS V2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#ff4d6d,#ffb3c1);color:white}
main{padding:15px;padding-bottom:90px}
.card{background:rgba(255,255,255,.15);padding:15px;border-radius:16px;margin-bottom:12px}
.tab{display:none}.active{display:block}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:70px;display:flex;justify-content:space-around;align-items:center;background:rgba(255,255,255,.2)}
button,input,textarea,select{border:none;border-radius:12px;padding:10px;margin-top:8px;width:100%;box-sizing:border-box}
.tabbar button{width:auto;background:none;color:white}
#map{height:350px;border-radius:12px}
</style>
</head>

<body>
<main>

<div id="home" class="tab active">
<div class="card">
<h2>❤️ D + T </h2>
<p id="days"></p>
<p id="thought">Nobody has tapped Thinking Of You yet ❤️</p>
<button onclick="thinking()">❤️ Thinking Of You</button>
</div>
</div>

<div id="notesTab" class="tab">
<div class="card">
<input id="note" placeholder="Love note">
<button onclick="addNote()">Send Note</button>
<div id="notes"></div>
</div>
</div>

<div id="checkTab" class="tab">
<div class="card">
<select id="mood">
<option>😊 Happy</option>
<option>❤️ Connected</option>
<option>😐 Neutral</option>
<option>🥲 Sad</option>
<option>😔 Down</option>
<option>😡 Frustrated</option>
<option>🥺 Need Support</option>
<option>😍 In Love</option>
<option>🤩 Excited</option>
<option>🍑 Horny</option>
<option>🖕🏻 Livid</option>
</select>

<textarea id="best" placeholder="Best moment"></textarea>
<button onclick="saveCheck()">Check In</button>

<div id="checks"></div>
</div>
</div>

<div id="wheelTab" class="tab">
<div class="card">
<h3>🎡 Date Wheel</h3>

<div style="font-size:40px;text-align:center;margin-bottom:-20px;">▼</div>

<canvas id="wheel" width="400" height="400"></canvas>

<button onclick="spin()">🎡 Spin Date Wheel</button>
<p id="result"></p>
</div>
</div>

<div id="mapTab" class="tab">
<div class="card">
<input id="placeName" placeholder="Place">
<input id="placeMemory" placeholder="Memory">
<button onclick="addPlace()">Add Place</button>
</div>

<div class="card">
<div id="map"></div>
</div>
</div>

</main>

<div class="tabbar">
<button onclick="openTab('home')">🏠</button>
<button onclick="openTab('notesTab')">💌</button>
<button onclick="openTab('checkTab')">🧾</button>
<button onclick="openTab('wheelTab')">🎡</button>
<button onclick="openTab('mapTab')">🗺️</button>
</div>

<script>
/* =========================
   ELEMENTS (FIXED CRASH)
========================= */
const days = document.getElementById("days");
const thought = document.getElementById("thought");
const notesEl = document.getElementById("notes");
const checksEl = document.getElementById("checks");
const noteEl = document.getElementById("note");
const placeNameEl = document.getElementById("placeName");
const placeMemoryEl = document.getElementById("placeMemory");

/* =========================
   SUPABASE
========================= */
const supabase = window.supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

/* =========================
   BASIC UI
========================= */
const start = new Date('2026-05-23');

days.innerText =
  '❤️ Together for ' +
  Math.floor((Date.now() - start) / (1000 * 60 * 60 * 24)) +
  ' days';

function openTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =========================
   SAFE SUPABASE
========================= */
async function getData(key){
  const { data } = await supabase
    .from("couple_data")
    .select("value")
    .eq("key", key)
    .maybeSingle();

  return data?.value ?? null;
}

async function saveData(key,value){
  await supabase
    .from("couple_data")
    .upsert({ key, value });
}

/* =========================
   THINKING OF YOU
========================= */
async function thinking(){
  const time = new Date().toLocaleString();
  await saveData("thought", time);
  thought.innerText = "❤️ Thinking of you tapped at " + time;
}

async function loadThought(){
  const t = await getData("thought");
  if(t) thought.innerText = "❤️ Thinking of you tapped at " + t;
}

/* =========================
   NOTES
========================= */
async function addNote(){
  let n = noteEl.value.trim();
  if(!n) return;

  let arr = await getData("notes") || [];
  arr.unshift(n);

  await saveData("notes", arr);

  noteEl.value = "";
  renderNotes();
}

async function renderNotes(){
  let arr = await getData("notes") || [];
  notesEl.innerHTML = arr.map(x=>`<div class="card">❤️ ${x}</div>`).join('');
}

/* =========================
   CHECK-INS
========================= */
async function saveCheck(){
  let arr = await getData("checks") || [];

  arr.unshift({
    m: document.getElementById("mood").value,
    b: document.getElementById("best").value
  });

  await saveData("checks", arr);

  document.getElementById("best").value = "";
  renderChecks();
}

async function renderChecks(){
  let arr = await getData("checks") || [];
  checksEl.innerHTML = arr.map(x=>`<div class="card">${x.m}<br>${x.b}</div>`).join('');
}

/* =========================
   MAP
========================= */
const map = L.map('map').setView([30.3322,-81.6557],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let places = [];
let markers = [];

async function loadPlaces(){
  places = await getData("places") || [];
  drawPlaces();
}

function drawPlaces(){
  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  places.forEach(p=>{
    const marker = L.marker([p.lat,p.lon])
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br>${p.memory}`);
    markers.push(marker);
  });
}

async function addPlace(){
  let name = placeNameEl.value.trim();
  if(!name) return;

  let placesData = await getData("places") || [];

  placesData.push({
    name,
    memory: placeMemoryEl.value,
    lat: 30.3322 + (Math.random()-0.5)*0.2,
    lon: -81.6557 + (Math.random()-0.5)*0.2
  });

  await saveData("places", placesData);

  placeNameEl.value="";
  placeMemoryEl.value="";
  loadPlaces();
}

/* =========================
   DATE WHEEL
========================= */
const options=[
"🍕 Pizza Night","🌅 Beach Sunset","☕ Coffee Date","🎬 Movie Night",
"🍦 Ice Cream Run","🎳 Bowling","🏖️ Beach Day","🚗 Road Trip",
"🍔 Try New Restaurant","🎮 Game Night"
];

let rotation=0;
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

function drawWheel(){
  ctx.clearRect(0,0,400,400);
  const arc=(2*Math.PI)/options.length;

  for(let i=0;i<options.length;i++){
    const angle=i*arc;

    ctx.beginPath();
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,angle,angle+arc);

    ctx.fillStyle=i%2?"#ffd166":"#ff6b81";
    ctx.fill();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(angle+arc/2);

    ctx.fillStyle="white";
    ctx.font="14px sans-serif";
    ctx.fillText(options[i],90,5);
    ctx.restore();
  }
}
drawWheel();

function spin(){
  const arcDeg=360/options.length;
  rotation+=2500+Math.random()*800;

  canvas.style.transition="transform 3s ease-out";
  canvas.style.transform=`rotate(${rotation}deg)`;

  setTimeout(()=>{
    const normalized=(360-(rotation%360))%360;
    const index=Math.floor(normalized/arcDeg);

    document.getElementById("result").innerHTML=
      `❤️ Tonight's Date:<br><strong>${options[index]}</strong>`;

    confetti({particleCount:200,spread:120,origin:{y:0.6}});
  },3000);
}

/* =========================
   INIT
========================= */
window.addEventListener("load", async ()=>{
  renderNotes();
  renderChecks();
  loadThought();
  loadPlaces();
});

/* =========================
   REALTIME SYNC
========================= */
supabase
  .channel("couple-sync")
  .on("postgres_changes",
    {event:"*",schema:"public",table:"couple_data"},
    ()=>{
      renderNotes();
      renderChecks();
      loadThought();
      loadPlaces();
    }
  )
  .subscribe();
</script>

</body>
</html>
