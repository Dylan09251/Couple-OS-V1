<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Couple OS V2</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#ff4d6d,#ffb3c1);color:white}
main{padding:15px;padding-bottom:90px}
.card{background:rgba(255,255,255,.15);padding:15px;border-radius:16px;margin-bottom:12px}
.tab{display:none}.active{display:block}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:70px;display:flex;justify-content:space-around;align-items:center;background:rgba(255,255,255,.2)}
button,input,textarea,select{border:none;border-radius:12px;padding:10px;margin-top:8px;width:100%;box-sizing:border-box}
.tabbar button{width:auto;background:none;color:white}
#map{height:350px;border-radius:12px}
</style>
</head>
<body>
<main>
<div id="home" class="tab active">
<div class="card">
<h2>❤️ D + T </h2>
<p id="days"></p>
<p id="thought">Nobody has tapped Thinking Of You yet ❤️</p>
<button onclick="thinking()">❤️ Thinking Of You</button>
</div>
</div>

<div id="notesTab" class="tab">
<div class="card">
<input id="note" placeholder="Love note">
<button onclick="addNote()">Send Note</button>
<div id="notes"></div>
</div>
</div>

<div id="checkTab" class="tab">
<div class="card">
<select id="mood">
  <option>😊 Happy</option>
  <option>❤️ Connected</option>
  <option>😐 Neutral</option>
  <option>🥲 Sad</option>
  <option>😔 Down</option>
  <option>😡 Frustrated</option>
  <option>🥺 Need Support</option>
  <option>😍 In Love</option>
  <option>🤩 Excited</option>
  <option>Horny</option>
  <option>Livid</option>
</select>
<textarea id="best" placeholder="Best moment"></textarea>
<button onclick="saveCheck()">
Check In
</button>

<div id="checks"></div>
</div>
</div>

<div id="wheelTab" class="tab">

<div class="card">

<h3>🎡 Date Wheel</h3>

<div style="
font-size:40px;
text-align:center;
margin-bottom:-20px;
">
▼
</div>

<canvas
id="wheel"
width="400"
height="400">
</canvas>

<button onclick="spin()">
🎡 Spin Date Wheel
</button>

<p id="result"></p>

</div>

</div>

<div id="mapTab" class="tab">
<div class="card">
<input id="placeName" placeholder="Place">
<input id="placeMemory" placeholder="Memory">
<button onclick="addPlace()">Add Place</button>
</div>
<div class="card"><div id="map"></div></div>
</div>
</main>

<div class="tabbar">
<button onclick="openTab('home')">🏠</button>
<button onclick="openTab('notesTab')">💌</button>
<button onclick="openTab('checkTab')">🧾</button>
<button onclick="openTab('wheelTab')">🎡</button>
<button onclick="openTab('mapTab')">🗺️</button>
</div>

<script>
const start=new Date('2026-05-23');
days.innerText='❤️ Together for '+Math.floor((Date.now()-start)/(1000*60*60*24))+' days';

function openTab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='mapTab')setTimeout(()=>map.invalidateSize(),100);}

function thinking(){localStorage.setItem('thought',new Date().toLocaleString());thought.innerText='❤️ Thinking of you tapped at '+localStorage.getItem('thought');}
if(localStorage.getItem('thought')) thought.innerText='❤️ Thinking of you tapped at '+localStorage.getItem('thought');

function addNote(){let n=note.value.trim(); if(!n)return; let arr=JSON.parse(localStorage.getItem('notes')||'[]'); arr.unshift(n); localStorage.setItem('notes',JSON.stringify(arr)); renderNotes(); note.value='';}
function renderNotes(){let arr=JSON.parse(localStorage.getItem('notes')||'[]'); notes.innerHTML=arr.map(x=>'<div class="card">❤️ '+x+'</div>').join('');}
renderNotes();

function renderChecks(){let arr=JSON.parse(localStorage.getItem('checks')||'[]'); checks.innerHTML=arr.map(x=>'<div class="card">'+x.m+'<br>'+x.b+'</div>').join('');}
renderChecks();

const map=L.map('map').setView([30.3322,-81.6557],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let places=JSON.parse(localStorage.getItem('places')||'[]');
function drawPlaces(){places.forEach(p=>L.marker([p.lat,p.lon]).addTo(map).bindPopup('<b>'+p.name+'</b><br>'+p.memory));}
drawPlaces();
function addPlace(){
let name=placeName.value.trim(); if(!name)return;
let p={name,memory:placeMemory.value,lat:30.3322+(Math.random()-.5)*.2,lon:-81.6557+(Math.random()-.5)*.2};
places.push(p); localStorage.setItem('places',JSON.stringify(places)); location.reload();
}
function saveCheck(){

if(document.getElementById("mood").value === "😢 Sad"){
alert("❤️ Remember you're loved.");
}

let arr =
JSON.parse(
localStorage.getItem("checks") || "[]"
);

arr.unshift({
m: document.getElementById("mood").value,
b: document.getElementById("best").value
});

localStorage.setItem(
"checks",
JSON.stringify(arr)
);

renderChecks();

document.getElementById("best").value = "";
}
  const options = [
    "🍕 Pizza Night",
    "🌅 Beach Sunset",
    "☕ Coffee Date",
    "🎬 Movie Night",
    "🍦 Ice Cream Run",
    "🎳 Bowling",
    "🏖️ Beach Day",
    "🚗 Road Trip",
    "🍔 Try New Restaurant",
    "🎮 Game Night"
];

let rotation = 0;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function drawWheel() {

    ctx.clearRect(0,0,400,400);

    const arc = (2 * Math.PI) / options.length;

    for(let i=0;i<options.length;i++){

        const angle = i * arc;

        ctx.beginPath();
        ctx.moveTo(200,200);

        ctx.arc(
            200,
            200,
            200,
            angle,
            angle + arc
        );

        ctx.fillStyle =
            i % 2 === 0
            ? "#ff6b81"
            : "#ffd166";

        ctx.fill();

        ctx.save();

        ctx.translate(200,200);
        ctx.rotate(angle + arc/2);

        ctx.fillStyle = "white";
        ctx.font = "14px sans-serif";

        ctx.fillText(
            options[i],
            90,
            5
        );

        ctx.restore();
    }
}

drawWheel();

function spin(){

    const arcDeg = 360 / options.length;

    rotation += 2500 + Math.random() * 800;

    canvas.style.transition =
        "transform 3s ease-out";

    canvas.style.transform =
        `rotate(${rotation}deg)`;

    setTimeout(()=>{

        const normalized =
            (360 - (rotation % 360)) % 360;

        const index =
            Math.floor(normalized / arcDeg);

        document.getElementById("result")
        .innerHTML =
        `❤️ Tonight's Date:<br><strong>${options[index]}</strong>`;

        confetti({
            particleCount: 200,
            spread: 120,
            origin:{y:0.6}
        });

    },3000);
}
</script>
</body>
</html>
